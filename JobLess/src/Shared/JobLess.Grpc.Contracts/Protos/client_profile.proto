syntax = "proto3";

option csharp_namespace = "JobLess.Grpc.Contracts";

package clientprofile;

service ClientProfileGrpc {
  rpc GetByEmail (GetByEmailRequest) returns (ClientProfileReply);
}

message GetByEmailRequest {
  string email = 1;
}

message ClientProfileReply {
  bool found = 1;
  int32 client_id = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
}
