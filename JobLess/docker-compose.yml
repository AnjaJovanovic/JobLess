services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jobless-sql
    environment:
      SA_PASSWORD: "JobLess_Pass123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - jobless-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'JobLess_Pass123!' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: jobless-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - jobless-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  auth-service:
    build:
      context: .
      dockerfile: src/Security/Dockerfile
    container_name: jobless-auth
    ports:
      - "5218:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityConnectionString: >-
        Server=sql-server,1433;
        Database=JobLessIdentityDb;
        User Id=sa;
        Password=JobLess_Pass123!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
      Jwt__Key: "JobLess-Super-Secret-Key-2025-Must-Be-At-Least-32-Chars!"
      Jwt__Issuer: "JobLess.Auth"
      Jwt__Audience: "JobLess.Client"
      Jwt__ExpirationMinutes: "5"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      sql-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - jobless-network
    restart: on-failure

  client-service:
    build:
      context: .
      dockerfile: src/Services/Client/JobLess.Client.API/Dockerfile
    container_name: jobless-client
    ports:
      - "5263:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Server=sql-server,1433;
        Database=JobLessClientDb;
        User Id=sa;
        Password=JobLess_Pass123!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      sql-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - jobless-network
    restart: on-failure

  advertisement-service:
    build:
      context: .
      dockerfile: src/Services/Advertisement/JobLess.Advertisement.API/Dockerfile
    container_name: jobless-advertisement
    ports:
      - "5104:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Server=sql-server,1433;
        Database=JobLessDatabase;
        User Id=sa;
        Password=JobLess_Pass123!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - jobless-network
    restart: on-failure

  company-service:
    build:
      context: .
      dockerfile: src/Services/Company/JobLess.Company.API/Dockerfile
    container_name: jobless-company
    ports:
      - "5287:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Server=sql-server,1433;
        Database=JobLessCompanyDatabase;
        User Id=sa;
        Password=JobLess_Pass123!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - jobless-network
    restart: on-failure
  notification-service:
    build:
      context: .
      dockerfile: src/Services/Notification/JobLess.Notification.API/Dockerfile
    container_name: jobless-notification
    ports:
      - "5240:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Server=sql-server,1433;
        Database=JobLessNotificationDb;
        User Id=sa;
        Password=JobLess_Pass123!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
      Jwt__Key: "JobLess-Super-Secret-Key-2025-Must-Be-At-Least-32-Chars!"
      Jwt__Issuer: "JobLess.Auth"
      Jwt__Audience: "JobLess.Client"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Smtp__Host: "smtp.gmail.com"
      Smtp__Port: "587"
      Smtp__UserName: "jobless.matf@gmail.com"
      Smtp__Password: "bhajjqwavtofnzxy"
      Smtp__FromEmail: "jobless.matf@gmail.com"
      Smtp__FromName: "JobLess"
    depends_on:
      sql-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - jobless-network
    restart: on-failure
  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: jobless-frontend
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - client-service
      - advertisement-service
      - company-service
    networks:
      - jobless-network
    restart: on-failure

volumes:
  sqlserver_data:

networks:
  jobless-network:
    driver: bridge