services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jobless-sql
    environment:
      SA_PASSWORD: "JobLess_Pass123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - jobless-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'JobLess_Pass123!' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # AUTHENTICATION SERVICE
  auth-service:
    build:
      context: .
      dockerfile: src/Security/Dockerfile
    container_name: jobless-auth
    ports:
      - "5218:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityConnectionString: >-
        Server=sql-server,1433;
        Database=JobLessIdentityDb;
        User Id=sa;
        Password=JobLess_Pass123!;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
      Jwt__Key: "JobLess-Super-Secret-Key-2025-Must-Be-At-Least-32-Chars!"
      Jwt__Issuer: "JobLess.Auth"
      Jwt__Audience: "JobLess.Client"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - jobless-network
    restart: on-failure

volumes:
  sqlserver_data:

networks:
  jobless-network:
    driver: bridge